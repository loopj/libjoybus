name: Build Pico Examples

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PICO_SDK_VERSION: 2.2.0
  PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk

jobs:
  # Cache the Pico SDK once so matrix jobs only restore, never racing to save.
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Cache Pico SDK
        id: cache-pico-sdk
        uses: actions/cache@v5
        with:
          path: pico-sdk
          key: pico-sdk-${{ env.PICO_SDK_VERSION }}

      - name: Install Pico SDK
        if: steps.cache-pico-sdk.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.PICO_SDK_VERSION }} \
            --recurse-submodules --shallow-submodules \
            https://github.com/raspberrypi/pico-sdk.git pico-sdk

  build-pico-examples:
    needs: setup
    runs-on: ubuntu-latest

    strategy:
      matrix:
        example:
          - gcn-adapter-nintendo
          - gcn-adapter-usb-hid
          - gcn-host
          - gcn-target
          - n64-adapter-usb-hid
          - n64-host
          - n64-target

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Setup dependencies
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3 build-essential gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

      # Restore the Pico SDK populated by the setup job
      - name: Restore Pico SDK
        uses: actions/cache/restore@v5
        with:
          path: pico-sdk
          key: pico-sdk-${{ env.PICO_SDK_VERSION }}
          fail-on-cache-miss: true

      # Build each example
      - name: Build project
        working-directory: examples/pico-sdk/${{ matrix.example }}
        run: |
          cmake -Bbuild -GNinja .
          cmake --build build
